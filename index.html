<body>
<script>
  // Google Maps betöltés jelzése Flutter felé
  function onGoogleMapsLoaded() {
    window._mapsLoaded = true;
  }
</script>

<!-- async + defer + callback: Flutter és Maps párhuzamosan töltődnek,
     de a térkép widget csak akkor renderel, ha mindkettő kész -->
<script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCCVXBrJdsCFW86_6BrvMqglgoGpNo1MkU&callback=onGoogleMapsLoaded&language=hu&region=HU"
        async
        defer>
</script>

<script src="flutter_bootstrap.js" async></script>
<script src="https://js.stripe.com/v3/"></script>
</body>
</html>
